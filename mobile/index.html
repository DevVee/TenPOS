<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TenPOS" />
    <meta name="theme-color" content="#E5484D" />
    <link rel="manifest" href="/manifest.json" />
    <title>TenPOS</title>

    <!-- System fonts only — Google Fonts CDN is unreachable from Capacitor WebView -->

    <!-- Inline loading screen — visible immediately, before any JS parses -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%;background:#fff}
      #app-loading{
        position:fixed;inset:0;z-index:9999;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:#fff;
      }
      #app-loading .logo-wrap{
        width:96px;height:96px;border-radius:24px;
        background:#E5484D;display:flex;align-items:center;justify-content:center;
        box-shadow:0 12px 32px rgba(229,72,77,.35);
        margin-bottom:24px;
      }
      #app-loading .logo-wrap img{width:64px;height:64px;object-fit:contain}
      #app-loading .spinner{
        width:40px;height:40px;border-radius:50%;
        border:3px solid #fee2e2;border-top-color:#E5484D;
        animation:tenpos-spin .75s linear infinite;
        margin-bottom:20px;
      }
      #app-loading p{
        color:#9ca3af;font-size:15px;
        font-family:system-ui,-apple-system,sans-serif;
        letter-spacing:.02em;
      }
      #app-loading.fade-out{
        opacity:0;transition:opacity .3s ease;pointer-events:none;
      }
      @keyframes tenpos-spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <!-- Shown before React loads — removed by main.tsx once app is ready -->
    <div id="app-loading">
      <div class="logo-wrap">
        <img src="/brand/logo.png" alt="TenPOS"
          onerror="this.parentElement.innerHTML='<span style=\'color:#fff;font-weight:800;font-size:22px;font-family:system-ui\'>T</span>'" />
      </div>
      <div class="spinner"></div>
      <p>Loading TenPOS…</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
